services:
  skill-control:
    build: .
    container_name: skill-control
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3002}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /app/server/data
      JWT_SECRET: ${JWT_SECRET}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-系统管理员}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
    volumes:
      - skill-control-data:/app/server/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  skill-control-data:
